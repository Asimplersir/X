http_port: 3080
socks_port: 3090
vif_only: true
hijack_dns:
- '*:53'
geoip_db_url: https://raw.gitmirror.com/soffchen/GeoIP2-CN/release/Country.mmdb
dns_servers:
- 223.5.5.5
- 1.1.1.1
hosts:
  dns.alidns.com: 223.5.5.5
  dns.google: 8.8.8.8
  one.one.one.one: 1.1.1.1
secure_dns:
  servers:
  - https://223.5.5.5/dns-query
  - https://1.1.1.1/dns-query
  ecs: false
  public_ip_lookup_url: ''
policy_groups:
- select:
    name: Final
    policies:
    - Proxy
    - DIRECT
    icon: https://raw.gitmirror.com/Koolson/Qure/master/IconSet/mini/Final.png
- select:
    name: Proxy
    policies:
    - Auto
    - Fallback
    - HongKong
    - TaiWan
    - Singapore
    - Japan
    - America
    - Others
    icon: https://raw.gitmirror.com/Koolson/Qure/master/IconSet/mini/Proxy.png
    hidden: false
- external:
    name: Auto
    type: auto_test
    urls:
    - 此处填入你的订阅链接
    filter: ^((?!Traffic|Expire)).*$
    interval: 600
    tolerance: 50
    timeout: 5
    update_interval: 86400
    icon: https://raw.gitmirror.com/Koolson/Qure/master/IconSet/mini/Auto.png
- external:
