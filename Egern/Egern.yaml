    policy: 国外网站
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Telegram/Telegram.yaml
    policy: 电报消息
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Twitter/Twitter.yaml
    policy: 推特消息
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Spotify/Spotify.yaml
    policy: 国际媒体
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/TikTok/TikTok.yaml
    policy: 国际抖音
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Bing/Bing.yaml
    policy: 国外网站
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/YouTube/YouTube.yaml
    policy: 谷歌服务
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Google/Google.yaml
    policy: 谷歌服务
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Proxy/Proxy.yaml
    policy: 国外网站
- rule_set:
    match: https://raw.githubusercontent.com/Repcz/EgernRules/X/Rules/Lan/Lan.yaml
    policy: 国内分流
- geoip:
    match: CN
    policy: DIRECT
- default:
    policy: 兜底分流
mitm:
  enabled: true
modules:
- name: 'Script Hub: 重写 & 规则集转换'
  url: https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/modules/script-hub.surge.sgmodule
  enabled: true
