[dns]
no-system
no-ipv6
server = 8.8.8.8
server = 8.8.4.4
;server = [2001:4860:4860::8888]
;server = [2001:4860:4860::8844]
;doq-server = quic://dns.adguard.com
;doh-server = https://dns.alidns.com/dns-query                                                                             

